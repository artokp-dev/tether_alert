<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USDT 차익거래 알리미</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+KR:wght@300;400;700&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --accent: #00ff88;
    --accent2: #ff6b35;
    --warn: #ffcc00;
    --text: #e0e0f0;
    --muted: #555570;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
  }

  .grid-bg {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .container {
    width: 100%;
    max-width: 480px;
    position: relative;
    z-index: 1;
  }

  header {
    text-align: center;
    margin-bottom: 32px;
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  h1 {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    font-size: 12px;
    color: var(--muted);
    margin-top: 6px;
    font-family: 'Space Mono', monospace;
  }

  /* 카카오 로그인 섹션 */
  .kakao-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 20px;
  }

  .section-label {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    font-family: 'Space Mono', monospace;
    margin-bottom: 16px;
  }

  .kakao-btn {
    width: 100%;
    background: #FEE500;
    color: #191919;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: opacity 0.2s;
  }

  .kakao-btn:hover { opacity: 0.9; }
  .kakao-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .kakao-icon {
    width: 20px;
    height: 20px;
    background: #191919;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: #FEE500;
    font-weight: 900;
  }

  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-family: 'Space Mono', monospace;
    padding: 6px 12px;
    border-radius: 20px;
    margin-top: 12px;
  }

  .status-badge.connected {
    background: rgba(0,255,136,0.1);
    color: var(--accent);
    border: 1px solid rgba(0,255,136,0.3);
  }

  .status-badge.disconnected {
    background: rgba(255,107,53,0.1);
    color: var(--accent2);
    border: 1px solid rgba(255,107,53,0.3);
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: currentColor;
  }

  .dot.pulse {
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  /* 가격 카드 */
  .price-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 12px;
  }

  .price-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px 16px;
    text-align: center;
  }

  .exchange-name {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    font-family: 'Space Mono', monospace;
    margin-bottom: 10px;
  }

  .price-value {
    font-family: 'Space Mono', monospace;
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -1px;
  }

  .price-unit {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
    font-family: 'Space Mono', monospace;
  }

  /* 스프레드 카드 */
  .spread-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .spread-label {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    font-family: 'Space Mono', monospace;
  }

  .spread-value {
    font-family: 'Space Mono', monospace;
    font-size: 28px;
    font-weight: 700;
    transition: color 0.3s;
  }

  .spread-value.alert {
    color: var(--accent);
    text-shadow: 0 0 20px rgba(0,255,136,0.5);
    animation: glow 0.5s ease-in-out infinite alternate;
  }

  .spread-value.normal { color: var(--text); }

  @keyframes glow {
    from { text-shadow: 0 0 10px rgba(0,255,136,0.3); }
    to   { text-shadow: 0 0 30px rgba(0,255,136,0.8); }
  }

  .threshold-badge {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px 10px;
  }

  /* 컨트롤 버튼 */
  .control-btn {
    width: 100%;
    padding: 16px;
    border-radius: 12px;
    border: none;
    font-size: 15px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    margin-bottom: 12px;
  }

  .btn-start {
    background: var(--accent);
    color: #0a0a0f;
  }

  .btn-start:hover { background: #00e07a; }
  .btn-start:disabled { opacity: 0.3; cursor: not-allowed; }

  .btn-stop {
    background: transparent;
    color: var(--accent2);
    border: 1px solid var(--accent2);
  }

  .btn-stop:hover { background: rgba(255,107,53,0.1); }

  /* 로그 */
  .log-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    margin-top: 8px;
  }

  .log-title {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    font-family: 'Space Mono', monospace;
    margin-bottom: 12px;
  }

  .log-list {
    list-style: none;
    max-height: 160px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .log-item {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    display: flex;
    gap: 10px;
  }

  .log-item.alert-log { color: var(--accent); }
  .log-item .log-time { color: var(--border); min-width: 60px; }

  .next-check {
    text-align: center;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 12px;
  }

  .next-check span { color: var(--warn); }

  /* 알림 토스트 */
  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: var(--accent);
    color: #0a0a0f;
    padding: 14px 24px;
    border-radius: 12px;
    font-weight: 700;
    font-size: 14px;
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 999;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  .loading-dots::after {
    content: '';
    animation: dots 1.2s steps(3, end) infinite;
  }
  @keyframes dots {
    0%   { content: ''; }
    33%  { content: '.'; }
    66%  { content: '..'; }
    100% { content: '...'; }
  }
</style>
</head>
<body>
<div class="grid-bg"></div>

<div class="toast" id="toast">🚨 차익거래 기회!</div>

<div class="container">
  <header>
    <div class="logo">Arbitrage Monitor</div>
    <h1>USDT <span>스프레드</span> 알리미</h1>
    <div class="subtitle">업비트 vs 빗썸 · 기준 3원 · 30초 간격</div>
  </header>

  <!-- 카카오 로그인 -->
  <div class="kakao-section">
    <div class="section-label">카카오톡 알림 설정</div>
    <button class="kakao-btn" id="kakaoLoginBtn" onclick="kakaoLogin()">
      <div class="kakao-icon">K</div>
      카카오 로그인하여 알림 받기
    </button>
    <div id="kakaoStatus">
      <span class="status-badge disconnected">
        <span class="dot"></span> 미연결
      </span>
    </div>
  </div>

  <!-- 가격 표시 -->
  <div class="price-grid">
    <div class="price-card">
      <div class="exchange-name">Upbit</div>
      <div class="price-value" id="upbitPrice">—</div>
      <div class="price-unit">KRW / USDT</div>
    </div>
    <div class="price-card">
      <div class="exchange-name">Bithumb</div>
      <div class="price-value" id="bithumbPrice">—</div>
      <div class="price-unit">KRW / USDT</div>
    </div>
  </div>

  <!-- 스프레드 -->
  <div class="spread-card">
    <div>
      <div class="spread-label">현재 스프레드</div>
      <div class="spread-value normal" id="spreadValue">— 원</div>
    </div>
    <div class="threshold-badge">기준 ≥ 3원</div>
  </div>

  <!-- 버튼 -->
  <button class="control-btn btn-start" id="startBtn" onclick="startMonitoring()">모니터링 시작</button>
  <button class="control-btn btn-stop" id="stopBtn" onclick="stopMonitoring()" style="display:none">■ 중지</button>

  <div class="next-check" id="nextCheck" style="display:none">
    다음 확인까지 <span id="countdown">30</span>초
  </div>

  <!-- 로그 -->
  <div class="log-section">
    <div class="log-title">알림 로그</div>
    <ul class="log-list" id="logList">
      <li class="log-item"><span class="log-time">--:--:--</span><span>대기 중...</span></li>
    </ul>
  </div>
</div>

<script>
const APP_KEY = '7d61df7d3f0a3701ab48bb2a50fc47ab';
const REDIRECT_URI = location.href.split('?')[0];
const SPREAD_THRESHOLD = 3;
const CHECK_INTERVAL = 30;

let accessToken = null;
let monitorInterval = null;
let countdownInterval = null;
let countdown = CHECK_INTERVAL;

// 페이지 로드 시 토큰 확인
window.onload = () => {
  const params = new URLSearchParams(location.search);
  const code = params.get('code');
  const savedToken = localStorage.getItem('kakao_token');

  if (savedToken) {
    accessToken = savedToken;
    setKakaoConnected();
  } else if (code) {
    fetchToken(code);
  }
};

// 카카오 로그인
function kakaoLogin() {
  const url = `https://kauth.kakao.com/oauth/authorize?client_id=${APP_KEY}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=code&scope=talk_message`;
  location.href = url;
}

// 토큰 발급
async function fetchToken(code) {
  addLog('카카오 토큰 발급 중...');
  try {
    const res = await fetch('https://kauth.kakao.com/oauth/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({
        grant_type: 'authorization_code',
        client_id: APP_KEY,
        redirect_uri: REDIRECT_URI,
        code: code
      })
    });
    const data = await res.json();
    if (data.access_token) {
      accessToken = data.access_token;
      localStorage.setItem('kakao_token', accessToken);
      setKakaoConnected();
      history.replaceState({}, '', location.pathname);
      addLog('카카오 연결 완료 ✓');
    } else {
      addLog('토큰 발급 실패: ' + (data.error_description || ''));
    }
  } catch (e) {
    addLog('오류: ' + e.message);
  }
}

function setKakaoConnected() {
  document.getElementById('kakaoStatus').innerHTML = `
    <span class="status-badge connected">
      <span class="dot pulse"></span> 카카오톡 연결됨
    </span>`;
  document.getElementById('kakaoLoginBtn').disabled = true;
  document.getElementById('kakaoLoginBtn').textContent = '✓ 연결 완료';
}

// 모니터링 시작
function startMonitoring() {
  document.getElementById('startBtn').style.display = 'none';
  document.getElementById('stopBtn').style.display = 'block';
  document.getElementById('nextCheck').style.display = 'block';
  addLog('모니터링 시작');
  checkPrices();
  monitorInterval = setInterval(checkPrices, CHECK_INTERVAL * 1000);
  startCountdown();
}

function stopMonitoring() {
  clearInterval(monitorInterval);
  clearInterval(countdownInterval);
  document.getElementById('startBtn').style.display = 'block';
  document.getElementById('stopBtn').style.display = 'none';
  document.getElementById('nextCheck').style.display = 'none';
  addLog('모니터링 중지');
}

function startCountdown() {
  clearInterval(countdownInterval);
  countdown = CHECK_INTERVAL;
  document.getElementById('countdown').textContent = countdown;
  countdownInterval = setInterval(() => {
    countdown--;
    if (countdown <= 0) countdown = CHECK_INTERVAL;
    document.getElementById('countdown').textContent = countdown;
  }, 1000);
}

// 가격 조회
async function checkPrices() {
  try {
    const [upbitRes, bithumbRes] = await Promise.all([
      fetch('https://api.upbit.com/v1/ticker?markets=KRW-USDT'),
      fetch('https://api.bithumb.com/public/ticker/USDT_KRW')
    ]);

    const upbitData = await upbitRes.json();
    const bithumbData = await bithumbRes.json();

    const upbitPrice = upbitData[0]?.trade_price;
    const bithumbPrice = parseFloat(bithumbData?.data?.closing_price);

    if (!upbitPrice || !bithumbPrice) {
      addLog('가격 조회 실패');
      return;
    }

    document.getElementById('upbitPrice').textContent = upbitPrice.toLocaleString();
    document.getElementById('bithumbPrice').textContent = bithumbPrice.toLocaleString();

    const spread = Math.abs(upbitPrice - bithumbPrice);
    const spreadEl = document.getElementById('spreadValue');
    spreadEl.textContent = spread.toFixed(1) + '원';

    const now = new Date().toLocaleTimeString('ko-KR');

    if (spread >= SPREAD_THRESHOLD) {
      spreadEl.className = 'spread-value alert';
      addLog(`🚨 스프레드 ${spread.toFixed(1)}원 (업비트:${upbitPrice} / 빗썸:${bithumbPrice})`, true);
      showToast(`스프레드 ${spread.toFixed(1)}원 발생!`);
      if (accessToken) sendKakaoAlert(upbitPrice, bithumbPrice, spread);
    } else {
      spreadEl.className = 'spread-value normal';
      addLog(`확인: 스프레드 ${spread.toFixed(1)}원 (정상)`);
    }

    startCountdown();
  } catch (e) {
    addLog('조회 오류: ' + e.message);
  }
}

// 카카오톡 메시지 전송
async function sendKakaoAlert(upbit, bithumb, spread) {
  try {
    await fetch('https://kapi.kakao.com/v2/api/talk/memo/default/send', {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${accessToken}`,
        'Content-Type': 'application/x-www-form-urlencoded'
      },
      body: new URLSearchParams({
        template_object: JSON.stringify({
          object_type: 'text',
          text: `🚨 USDT 차익거래 기회!\n\n업비트: ${upbit.toLocaleString()}원\n빗썸: ${bithumb.toLocaleString()}원\n스프레드: ${spread.toFixed(1)}원\n\n⏰ ${new Date().toLocaleTimeString('ko-KR')}`,
          link: { web_url: 'https://upbit.com', mobile_web_url: 'https://upbit.com' }
        })
      })
    });
  } catch (e) {
    addLog('카카오 전송 오류: ' + e.message);
  }
}

// 토스트 알림
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = '🚨 ' + msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}

// 로그 추가
function addLog(msg, isAlert = false) {
  const list = document.getElementById('logList');
  const time = new Date().toLocaleTimeString('ko-KR');
  const li = document.createElement('li');
  li.className = 'log-item' + (isAlert ? ' alert-log' : '');
  li.innerHTML = `<span class="log-time">${time}</span><span>${msg}</span>`;
  if (list.children.length === 1 && list.children[0].querySelector('span:last-child')?.textContent === '대기 중...') {
    list.innerHTML = '';
  }
  list.insertBefore(li, list.firstChild);
  if (list.children.length > 20) list.removeChild(list.lastChild);
}
</script>
</body>
</html>
