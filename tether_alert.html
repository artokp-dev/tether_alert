<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USDT 차익거래 알리미</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto Sans+KR:wght@300;400;700&display=swap');
  :root {
    --bg: #0a0a0f; --surface: #12121a; --border: #1e1e2e;
    --accent: #00ff88; --accent2: #ff6b35; --warn: #ffcc00;
    --text: #e0e0f0; --muted: #555570;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Noto Sans KR',sans-serif; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:24px 16px; }
  .grid-bg { position:fixed; inset:0; background-image: linear-gradient(rgba(0,255,136,0.03) 1px,transparent 1px), linear-gradient(90deg,rgba(0,255,136,0.03) 1px,transparent 1px); background-size:40px 40px; pointer-events:none; }
  .container { width:100%; max-width:480px; position:relative; z-index:1; }
  header { text-align:center; margin-bottom:32px; }
  .logo { font-family:'Space Mono',monospace; font-size:11px; letter-spacing:4px; color:var(--accent); text-transform:uppercase; margin-bottom:8px; }
  h1 { font-size:26px; font-weight:700; }
  h1 span { color:var(--accent); }
  .subtitle { font-size:12px; color:var(--muted); margin-top:6px; font-family:'Space Mono',monospace; }
  .info-box { background:rgba(0,255,136,0.05); border:1px solid rgba(0,255,136,0.2); border-radius:12px; padding:14px 16px; margin-bottom:20px; font-size:12px; color:var(--muted); line-height:1.8; font-family:'Space Mono',monospace; }
  .info-box strong { color:var(--accent); }
  .price-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px; }
  .price-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:20px 16px; text-align:center; }
  .exchange-name { font-size:10px; letter-spacing:3px; color:var(--muted); text-transform:uppercase; font-family:'Space Mono',monospace; margin-bottom:10px; }
  .price-value { font-family:'Space Mono',monospace; font-size:22px; font-weight:700; color:var(--text); }
  .price-unit { font-size:11px; color:var(--muted); margin-top:4px; font-family:'Space Mono',monospace; }
  .spread-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:20px; margin-bottom:20px; display:flex; align-items:center; justify-content:space-between; }
  .spread-label { font-size:10px; letter-spacing:3px; color:var(--muted); text-transform:uppercase; font-family:'Space Mono',monospace; }
  .spread-value { font-family:'Space Mono',monospace; font-size:28px; font-weight:700; transition:color 0.3s; }
  .spread-value.alert { color:var(--accent); animation:glow 0.5s ease-in-out infinite alternate; }
  .spread-value.normal { color:var(--text); }
  @keyframes glow { from { text-shadow:0 0 10px rgba(0,255,136,0.3); } to { text-shadow:0 0 30px rgba(0,255,136,0.8); } }
  .threshold-badge { font-family:'Space Mono',monospace; font-size:11px; color:var(--muted); background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:4px 10px; }
  .control-btn { width:100%; padding:16px; border-radius:12px; border:none; font-size:15px; font-weight:700; font-family:'Noto Sans KR',sans-serif; cursor:pointer; transition:all 0.2s; margin-bottom:12px; }
  .btn-start { background:var(--accent); color:#0a0a0f; }
  .btn-start:hover { background:#00e07a; }
  .btn-stop { background:transparent; color:var(--accent2); border:1px solid var(--accent2); }
  .btn-stop:hover { background:rgba(255,107,53,0.1); }
  .btn-test { background:transparent; color:var(--warn); border:1px solid var(--warn); margin-bottom:20px; }
  .btn-test:hover { background:rgba(255,204,0,0.1); }
  .next-check { text-align:center; font-family:'Space Mono',monospace; font-size:11px; color:var(--muted); margin-top:12px; margin-bottom:12px; }
  .next-check span { color:var(--warn); }
  .log-section { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:16px; margin-top:8px; }
  .log-title { font-size:10px; letter-spacing:3px; color:var(--muted); text-transform:uppercase; font-family:'Space Mono',monospace; margin-bottom:12px; }
  .log-list { list-style:none; max-height:160px; overflow-y:auto; display:flex; flex-direction:column; gap:6px; }
  .log-item { font-family:'Space Mono',monospace; font-size:11px; color:var(--muted); display:flex; gap:10px; }
  .log-item.alert-log { color:var(--accent); }
  .log-item .log-time { color:var(--border); min-width:60px; }
  .toast { position:fixed; top:20px; left:50%; transform:translateX(-50%) translateY(-80px); background:var(--accent); color:#0a0a0f; padding:14px 24px; border-radius:12px; font-weight:700; font-size:14px; transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1); z-index:999; white-space:nowrap; }
  .toast.show { transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="toast" id="toast">🚨 차익거래 기회!</div>
<div class="container">
  <header>
    <div class="logo">Arbitrage Monitor</div>
    <h1>USDT <span>스프레드</span> 알리미</h1>
    <div class="subtitle">업비트 vs 빗썸 · 기준 3원 · 30초 간격</div>
  </header>

  <div class="info-box">
    <strong>✓ 텔레그램 연결됨</strong><br>
    스프레드 3원 이상 시 텔레그램으로 자동 알림<br>
    (중복 방지: 1분에 최대 1회 전송)
  </div>

  <div class="price-grid">
    <div class="price-card">
      <div class="exchange-name">Upbit</div>
      <div class="price-value" id="upbitPrice">—</div>
      <div class="price-unit">KRW / USDT</div>
    </div>
    <div class="price-card">
      <div class="exchange-name">Bithumb</div>
      <div class="price-value" id="bithumbPrice">—</div>
      <div class="price-unit">KRW / USDT</div>
    </div>
  </div>

  <div class="spread-card">
    <div>
      <div class="spread-label">현재 스프레드</div>
      <div class="spread-value normal" id="spreadValue">— 원</div>
    </div>
    <div class="threshold-badge">기준 ≥ 3원</div>
  </div>

  <button class="control-btn btn-test" onclick="sendTestMessage()">📱 텔레그램 테스트 메시지 보내기</button>
  <button class="control-btn btn-start" id="startBtn" onclick="startMonitoring()">▶ 모니터링 시작</button>
  <button class="control-btn btn-stop" id="stopBtn" onclick="stopMonitoring()" style="display:none">■ 중지</button>
  <div class="next-check" id="nextCheck" style="display:none">다음 확인까지 <span id="countdown">30</span>초</div>

  <div class="log-section">
    <div class="log-title">알림 로그</div>
    <ul class="log-list" id="logList">
      <li class="log-item"><span class="log-time">--:--:--</span><span>대기 중...</span></li>
    </ul>
  </div>
</div>

<script>
const BOT_TOKEN = '8643580443:AAGe6kgVvKcSr8Wtiv8dumZrXVZDlBiwrl4';
const CHAT_ID = '1772649599';
const SPREAD_THRESHOLD = 3;
const CHECK_INTERVAL = 30;

let monitorInterval = null;
let countdownInterval = null;
let countdown = CHECK_INTERVAL;
let lastAlertTime = 0;

async function sendTelegram(msg) {
  try {
    const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chat_id: CHAT_ID, text: msg, parse_mode: 'HTML' })
    });
    return res.ok;
  } catch(e) {
    addLog('텔레그램 오류: ' + e.message);
    return false;
  }
}

async function sendTestMessage() {
  addLog('테스트 메시지 전송 중...');
  const ok = await sendTelegram('✅ 테더 차익거래 알리미 연결 성공!\n\n업비트/빗썸 USDT 스프레드 3원 이상 시 알림이 옵니다.');
  if (ok) {
    addLog('✓ 테스트 전송 완료!');
    showToast('텔레그램 확인해보세요!');
  } else {
    addLog('전송 실패 - 토큰 확인 필요');
  }
}

function startMonitoring() {
  document.getElementById('startBtn').style.display = 'none';
  document.getElementById('stopBtn').style.display = 'block';
  document.getElementById('nextCheck').style.display = 'block';
  addLog('모니터링 시작');
  checkPrices();
  monitorInterval = setInterval(checkPrices, CHECK_INTERVAL * 1000);
  startCountdown();
}

function stopMonitoring() {
  clearInterval(monitorInterval);
  clearInterval(countdownInterval);
  document.getElementById('startBtn').style.display = 'block';
  document.getElementById('stopBtn').style.display = 'none';
  document.getElementById('nextCheck').style.display = 'none';
  addLog('모니터링 중지');
}

function startCountdown() {
  clearInterval(countdownInterval);
  countdown = CHECK_INTERVAL;
  document.getElementById('countdown').textContent = countdown;
  countdownInterval = setInterval(() => {
    countdown--;
    if (countdown <= 0) countdown = CHECK_INTERVAL;
    document.getElementById('countdown').textContent = countdown;
  }, 1000);
}

async function checkPrices() {
  try {
    const [upbitRes, bithumbRes] = await Promise.all([
      fetch('https://api.upbit.com/v1/ticker?markets=KRW-USDT'),
      fetch('https://api.bithumb.com/public/ticker/USDT_KRW')
    ]);
    const upbitData = await upbitRes.json();
    const bithumbData = await bithumbRes.json();
    const upbitPrice = upbitData[0]?.trade_price;
    const bithumbPrice = parseFloat(bithumbData?.data?.closing_price);

    if (!upbitPrice || !bithumbPrice) { addLog('가격 조회 실패'); return; }

    document.getElementById('upbitPrice').textContent = upbitPrice.toLocaleString();
    document.getElementById('bithumbPrice').textContent = bithumbPrice.toLocaleString();

    const spread = Math.abs(upbitPrice - bithumbPrice);
    const spreadEl = document.getElementById('spreadValue');
    spreadEl.textContent = spread.toFixed(1) + '원';

    if (spread >= SPREAD_THRESHOLD) {
      spreadEl.className = 'spread-value alert';
      addLog(`🚨 스프레드 ${spread.toFixed(1)}원!`, true);
      showToast(`스프레드 ${spread.toFixed(1)}원!`);
      if (Date.now() - lastAlertTime > 60000) {
        lastAlertTime = Date.now();
        const higher = upbitPrice > bithumbPrice ? '업비트 > 빗썸' : '빗썸 > 업비트';
        await sendTelegram(
          `🚨 <b>USDT 차익거래 기회!</b>\n\n` +
          `업비트: ${upbitPrice.toLocaleString()}원\n` +
          `빗썸: ${bithumbPrice.toLocaleString()}원\n` +
          `스프레드: <b>${spread.toFixed(1)}원</b>\n` +
          `방향: ${higher}\n\n` +
          `⏰ ${new Date().toLocaleTimeString('ko-KR')}`
        );
      }
    } else {
      spreadEl.className = 'spread-value normal';
      addLog(`스프레드 ${spread.toFixed(1)}원 (정상)`);
    }
    startCountdown();
  } catch(e) {
    addLog('조회 오류: ' + e.message);
  }
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = '🚨 ' + msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}

function addLog(msg, isAlert = false) {
  const list = document.getElementById('logList');
  const time = new Date().toLocaleTimeString('ko-KR');
  const li = document.createElement('li');
  li.className = 'log-item' + (isAlert ? ' alert-log' : '');
  li.innerHTML = `<span class="log-time">${time}</span><span>${msg}</span>`;
  if (list.children.length === 1 && list.children[0].textContent.includes('대기 중')) list.innerHTML = '';
  list.insertBefore(li, list.firstChild);
  if (list.children.length > 20) list.removeChild(list.lastChild);
}
</script>
</body>
</html>
